{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
    <h1 class="mb-4">Login</h1>
    {% if form.errors %}
        <div class="alert alert-danger">Your email or password was incorrect. Please try again.</div>
    {% endif %}
    <form method="post" class="w-50">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
{% endblock %}
